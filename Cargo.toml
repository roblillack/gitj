[package]
name = "git-journey"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "A gitk-style, Windows 3.1-flavored git repository browser built on the saudade toolkit"
authors = ["Robert Lillack <rob@lillack.net>"]
repository = "https://github.com/roblillack/git-journey"
homepage = "https://github.com/roblillack/git-journey"
license = "MIT"
readme = "README.md"
keywords = ["git", "gitk", "git-gui", "retro", "gui"]
categories = ["command-line-utilities", "development-tools", "gui"]

# The snapshot baselines and bundled test fonts are only needed to run the test
# suite, not to build or use the crate — keep them out of the published package.
exclude = ["tests/snapshots", "tests/fonts"]

[dependencies]
saudade = "0.3"
git2 = { version = "0.18", default-features = false }

[dev-dependencies]
insta = "1"

# The library half (backend + widgets + ui) is what the snapshot tests in
# tests/ link against; main.rs is the thin binary on top of it.
[lib]
name = "journey"
path = "src/lib.rs"

[[bin]]
name = "gitj"
path = "src/main.rs"
