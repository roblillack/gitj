[package]
name = "journey"
version = "0.1.0"
edition = "2024"

# A gitk-style repository browser built on the retrogui toolkit.
# See ../retrofetch/retrogui for the GUI library.

[dependencies]
retrogui = { path = "../retrofetch/retrogui" }
git2 = { version = "0.18", default-features = false }

[dev-dependencies]
insta = "1"

# The library half (backend + widgets + ui) is what the snapshot tests in
# tests/ link against; main.rs is the thin binary on top of it.
[lib]
name = "journey"
path = "src/lib.rs"

[[bin]]
name = "journey"
path = "src/main.rs"
