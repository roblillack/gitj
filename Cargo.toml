[package]
name = "gitj"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "A gitk-style, Windows 3.1-flavored git repository browser and commit helper built on the Saudade toolkit"
authors = ["Robert Lillack <rob@lillack.net>"]
repository = "https://github.com/roblillack/gitj"
homepage = "https://github.com/roblillack/gitj"
license = "MIT"
readme = "README.md"
keywords = ["git", "gitk", "git-gui", "retro", "gui"]
categories = ["gui", "development-tools"]

# The snapshot baselines and bundled test fonts are only needed to run the test
# suite (and the screenshots example, which renders the README images from those
# fonts), not to build or use the crate — keep them out of the published package.
exclude = ["tests/snapshots", "tests/fonts", "examples"]

[dependencies]
saudade = "0.3"
git2 = { version = "0.18", default-features = false }

[dev-dependencies]
insta = "1"

# The library half (backend + widgets + ui) is what the snapshot tests in
# tests/ link against; main.rs is the thin binary on top of it.
[lib]
name = "journey"
path = "src/lib.rs"

[[bin]]
name = "gitj"
path = "src/main.rs"
